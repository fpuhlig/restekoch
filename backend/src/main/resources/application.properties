# GCP project ID, overridable via environment variable
quarkus.google.cloud.project-id=${GCP_PROJECT_ID:restekoch}

# Dev: Firestore emulator starts automatically
%dev.quarkus.google.cloud.firestore.devservice.enabled=true
%dev.quarkus.google.cloud.firestore.use-emulator-credentials=true

# Test: Firestore emulator for integration tests
%test.quarkus.google.cloud.firestore.devservice.enabled=true
%test.quarkus.google.cloud.project-id=test-project

# Prod: no emulator, connect to real Firestore
%prod.quarkus.google.cloud.firestore.devservice.enabled=false

# Redis: DevService starts Redis Stack automatically in dev/test
%dev.quarkus.redis.devservices.enabled=true
%dev.quarkus.redis.devservices.image-name=redis/redis-stack:latest
%test.quarkus.redis.devservices.enabled=true
%test.quarkus.redis.devservices.image-name=redis/redis-stack:latest
# Redis: env vars set by Ansible docker-compose template in real prod
%prod.quarkus.redis.hosts=redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}

# Logging: request ID in every log line via MDC
%dev.quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) {requestId=%X{requestId}} %s%e%n
%test.quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) {requestId=%X{requestId}} %s%e%n
%prod.quarkus.log.console.json=true

# Gemini: model configurable, same project/region as embeddings
restekoch.gemini.project-id=${GCP_PROJECT_ID:restekoch}
restekoch.gemini.region=europe-west1
restekoch.gemini.model=gemini-2.5-flash

# L2 semantic cache (ingredient embedding): similarity threshold (cosine, 0.0-1.0), TTL in seconds
restekoch.cache.enabled=true
restekoch.cache.similarity-threshold=0.95
restekoch.cache.ttl=3600

# L1 image cache (sha-256 of image bytes, model-scoped key): TTL 24h, image bytes are immutable
restekoch.image-cache.enabled=true
restekoch.image-cache.ttl=86400

# File upload: max 10 MB for fridge photos
quarkus.http.body.multipart.file-content-types=image/jpeg,image/png,image/webp
quarkus.http.limits.max-body-size=12M

# Reverse proxy: trust X-Forwarded-* headers from gateway
quarkus.http.proxy.proxy-address-forwarding=true
quarkus.http.proxy.allow-x-forwarded=true
quarkus.http.proxy.enable-forwarded-host=true
quarkus.http.proxy.enable-forwarded-prefix=true

# OpenAPI metadata
quarkus.smallrye-openapi.info-title=Restekoch API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Fridge-scanning recipe suggestion API
