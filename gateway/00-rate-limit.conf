# Inherit add_header from parent blocks (nginx 1.29.3+)
# Without this, a location block with any add_header loses all parent headers
add_header_inherit on;

# Whitelist internal IPs (no rate limit for Docker network and localhost)
geo $rate_limit_flag {
    default 1;
    127.0.0.1 0;
    10.0.0.0/8 0;
    172.16.0.0/12 0;
}

# Empty key = no rate limiting (whitelist bypass)
map $rate_limit_flag $rate_limit_key {
    0 "";
    1 $binary_remote_addr;
}

# 10 scan requests per minute per external IP
limit_req_zone $rate_limit_key zone=scan:10m rate=10r/m;
