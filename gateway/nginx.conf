server {
    listen 80;
    server_tokens off;

    # Docker DNS resolver (re-resolve every 30s on container restart)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Security headers (inherited to all locations via add_header_inherit)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Logging to stdout/stderr for docker logs
    access_log /dev/stdout;
    error_log /dev/stderr warn;

    # Health check (no upstream dependency)
    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain always;
    }

    # Custom JSON error pages
    error_page 429 = @rate_limited;
    error_page 502 503 504 = @backend_down;

    location @rate_limited {
        default_type application/json;
        return 429 '{"error":"Too many scan requests. Please wait a moment."}';
    }

    location @backend_down {
        default_type application/json;
        return 503 '{"error":"Service temporarily unavailable."}';
    }

    # Frontend static files
    location / {
        proxy_pass http://frontend:80$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Scan endpoint (rate limited)
    location /api/scan {
        limit_req zone=scan burst=5 nodelay;
        limit_req_status 429;
        client_max_body_size 12M;
        proxy_pass http://backend:8080$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Admin: index rebuild (internal only)
    location /api/index {
        allow 172.16.0.0/12;
        allow 10.0.0.0/8;
        allow 127.0.0.1;
        deny all;
        proxy_pass http://backend:8080$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Cache: GET public, DELETE/POST internal only
    location /api/cache {
        limit_except GET {
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            allow 127.0.0.1;
            deny all;
        }
        proxy_pass http://backend:8080$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # All other API endpoints
    location /api/ {
        proxy_pass http://backend:8080$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
