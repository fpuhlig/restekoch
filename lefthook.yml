pre-commit:
  parallel: true
  commands:
    backend-lint:
      glob: "backend/**/*.{kt,kts}"
      run: cd backend && ./gradlew ktlintCheck
    frontend-lint:
      glob: "frontend/**/*.{ts,tsx}"
      run: cd frontend && pnpm lint
    frontend-format:
      root: "frontend/"
      glob: "*.{ts,tsx,css}"
      run: pnpm prettier --write {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    backend-test:
      glob: "backend/**/*.{kt,kts}"
      run: cd backend && ./gradlew test
    frontend-build:
      glob: "frontend/**/*.{ts,tsx}"
      run: cd frontend && pnpm build
